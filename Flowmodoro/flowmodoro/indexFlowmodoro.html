<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowmodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styleFlowmodoro.css" />
</head>
<body>

  <div id="header">
    <h1>Flowmodoro <button id="gear-btn" title="Configurar ratio">⚙</button><span id="reset-area"><button id="reset-btn" title="Reiniciar todo">↺</button><span id="reset-confirm" hidden>¿Reinicar?&nbsp;<button id="reset-yes-btn">Sí</button><button id="reset-no-btn">No</button></span></span></h1>

    <div id="ratio-panel" hidden>
      <label>1 min descanso por cada
        <input id="ratio-input" type="number" min="1" max="60" value="5" />
        min de trabajo
      </label>
      <label id="title-label">
        <input id="title-check" type="checkbox" />
        Mostrar tiempo en título
      </label>
    </div>
  </div>

  <div id="info"></div>
  <div id="status">listo para empezar</div>

  <div id="timer" class="idle">00:00:00</div>



  <div id="actions">
    <button id="btn">&#9654; Iniciar</button>
    <button id="btn2" hidden>Saltar &#8594;</button>
    <button id="btn3" hidden>Continuar &#8594;</button>
  </div>

  <script src="appFlowmodoro.js"></script>
</body>
</html>
